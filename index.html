<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXECUTIVE STYLING | AI Personal Color Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        /** * [수행비서실 긴급 보고]
         * 회장님, 현재 구글 로그인은 성공했으나 분석 엔진이 작동하지 않는 것은 'AI 사용권(API Key)'이 입력되지 않았기 때문입니다.
         * 깃허브에서 직접 사용하시려면 아래 apiKey 자리에 발급받으신 키를 넣어주셔야 합니다.
         * 만약 키 없이 바로 테스트하시려면 이 화면 우측의 'Preview'를 활용해 주십시오.
         */
        const firebaseConfig = {
            apiKey: "AIzaSyDbwkCphrmNglt9wEpqm1hA257Nq9u6DvM",
            authDomain: "visual-analysis-15610.firebaseapp.com",
            projectId: "visual-analysis-15610",
            storageBucket: "visual-analysis-15610.firebasestorage.app",
            messagingSenderId: "1030724023702",
            appId: "1:1030724023702:web:7ef935a26f8dbcba1c99b7",
            measurementId: "G-L24XT1F4BW"
        };

        // 제미나이 AI API 키 (Canvas Preview에서는 자동 주입, 외부에서는 수동 입력 필요)
        const apiKey = ""; 

        // --- 시스템 핵심 로직 ---
        let auth;
        const provider = new GoogleAuthProvider();

        try {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
        } catch (e) {
            console.error("인증 시스템 초기화 오류");
        }

        const loginScreen = document.getElementById('login-screen');
        const mainScreen = document.getElementById('main-screen');
        const userNameDisplay = document.getElementById('user-name');
        const userPhotoDisplay = document.getElementById('user-photo');
        let selectedBase64 = null;

        window.onload = () => {
            lucide.createIcons();
            
            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try { await signInWithCustomToken(auth, __initial_auth_token); } catch(e) {}
                }
            };
            initAuth();

            if (auth) {
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        showScreen('main');
                        userNameDisplay.textContent = user.displayName || "회장님";
                        if (user.photoURL) userPhotoDisplay.src = user.photoURL;
                    } else {
                        showScreen('login');
                    }
                });
            }
        };

        function showScreen(type) {
            if (type === 'main') {
                loginScreen.classList.add('hidden');
                mainScreen.classList.remove('hidden');
            } else {
                loginScreen.classList.remove('hidden');
                mainScreen.classList.add('hidden');
            }
        }

        window.handleGoogleLogin = async () => {
            if (!auth) return;
            try {
                await signInWithPopup(auth, provider);
            } catch (err) {
                console.error(err);
                alert("구글 로그인 실패: 파이어베이스 설정에서 'Google' 승인 도메인을 확인해 주십시오.");
            }
        };

        window.handleLogout = () => {
            if (auth) signOut(auth).then(() => location.reload());
        };

        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const previewImg = document.getElementById('preview-img');
        const analyzeBtn = document.getElementById('analyze-btn');
        const resultArea = document.getElementById('result-area');
        const loadingState = document.getElementById('loading-state');
        const emptyState = document.getElementById('empty-state');

        uploadArea?.addEventListener('click', () => fileInput.click());
        fileInput?.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    selectedBase64 = event.target.result.split(',')[1];
                    previewImg.src = event.target.result;
                    previewImg.classList.remove('hidden');
                    uploadArea.querySelector('.upload-placeholder').classList.add('hidden');
                    analyzeBtn.classList.remove('hidden');
                    resultArea.classList.add('hidden');
                    emptyState.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        window.startAnalysis = async () => {
            if (!selectedBase64) return;
            
            if (apiKey === "AIzaSyBibl0I4VGCE2mGHKTt53eMBu4TX2ji5Yc") {
                const modal = document.createElement('div');
                modal.className = "fixed inset-0 bg-black/80 flex items-center justify-center z-[100] p-6";
                modal.innerHTML = `
                    <div class="bg-white p-8 rounded-[2rem] max-w-sm w-full space-y-4 text-center">
                        <div class="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center mx-auto text-amber-600">
                            <i data-lucide="alert-triangle"></i>
                        </div>
                        <h4 class="text-xl font-bold">API 키 미설정</h4>
                        <p class="text-stone-500 text-sm leading-relaxed">회장님, 현재 AI 분석 엔진을 가동하기 위한 열쇠가 비어있습니다. 우측 'Preview' 버튼을 이용하시거나, 코드 상단의 apiKey를 입력해 주십시오.</p>
                        <button onclick="this.parentElement.parentElement.remove()" class="w-full bg-black text-white py-4 rounded-xl font-bold">확인</button>
                    </div>
                `;
                document.body.appendChild(modal);
                lucide.createIcons();
                return;
            }

            analyzeBtn.classList.add('hidden');
            loadingState.classList.remove('hidden');
            emptyState.classList.add('hidden');

            const systemPrompt = `당신은 세계적인 퍼스널 컬러 전문가입니다. 인물의 사진을 분석하여 봄/여름/가을/겨울 타입을 진단하고 반드시 JSON으로만 답변하십시오: { "season": "결과", "summary": "요약", "bestPalette": ["#hex1", "..."], "worstPalette": ["#hex1", "..."], "advice": ["조언1", "조언2", "조언3"] }`;

            const payload = {
                contents: [{ parts: [
                    { text: "회장님의 피부톤과 이미지를 정밀 분석하여 리포트를 생성하십시오." }, 
                    { inlineData: { mimeType: "image/png", data: selectedBase64 } }
                ] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: { responseMimeType: "application/json", temperature: 0 }
            };

            const fetchWithRetry = async (retries = 3, delay = 1000) => {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error();
                    const data = await response.json();
                    const resultText = data.candidates[0].content.parts[0].text;
                    renderResult(JSON.parse(resultText));
                } catch (err) {
                    if (retries > 0) setTimeout(() => fetchWithRetry(retries - 1, delay * 2), delay);
                    else {
                        alert("분석 엔진이 응답하지 않습니다. 네트워크 환경이나 API 키 권한을 확인해 주십시오.");
                        analyzeBtn.classList.remove('hidden');
                        loadingState.classList.add('hidden');
                    }
                }
            };

            fetchWithRetry();
        };

        function renderResult(data) {
            loadingState.classList.add('hidden');
            resultArea.classList.remove('hidden');
            document.getElementById('res-season').textContent = data.season;
            document.getElementById('res-summary').textContent = data.summary;
            
            const bP = document.getElementById('best-palette'); bP.innerHTML = '';
            data.bestPalette.forEach(c => { 
                const d = document.createElement('div'); d.className="h-14 w-14 rounded-2xl shadow-lg border border-white/20 hover:scale-110 transition-transform cursor-pointer"; d.style.backgroundColor=c; bP.appendChild(d); 
            });

            const wP = document.getElementById('worst-palette'); wP.innerHTML = '';
            data.worstPalette.forEach(c => { 
                const d = document.createElement('div'); d.className="h-10 w-10 rounded-xl shadow-inner opacity-50"; d.style.backgroundColor=c; wP.appendChild(d); 
            });

            const aL = document.getElementById('advice-list'); aL.innerHTML = '';
            data.advice.forEach((t, i) => { 
                const li = document.createElement('div'); li.className="flex gap-4 text-sm text-stone-700 bg-white/50 p-5 rounded-3xl border border-stone-100 shadow-sm"; 
                li.innerHTML=`<div class="h-6 w-6 rounded-full bg-amber-600 text-white flex items-center justify-center text-[10px] font-bold flex-shrink-0">${i+1}</div><p>${t}</p>`; 
                aL.appendChild(li); 
            });
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.01em; }
    </style>
</head>
<body class="bg-[#fcfbf9] text-stone-900 antialiased">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="min-h-screen bg-[#0d0d0d] flex flex-col items-center justify-center p-8 text-white">
        <div class="max-w-md w-full text-center space-y-12 animate-in fade-in duration-1000">
            <div class="inline-block p-10 bg-amber-500 rounded-[3rem] shadow-2xl shadow-amber-500/20">
                <i data-lucide="user-check" class="w-20 h-20 text-black"></i>
            </div>
            <div class="space-y-4">
                <h1 class="text-5xl font-black italic tracking-tighter">EXECUTIVE ACCESS</h1>
                <p class="text-stone-400 font-medium text-lg leading-relaxed">Google 계정으로 로그인하시면<br>모든 인공지능 분석 권한이 활성화됩니다.</p>
            </div>
            
            <button onclick="handleGoogleLogin()" class="w-full bg-white text-black py-7 rounded-[2.5rem] font-black text-2xl hover:bg-stone-200 transition-all flex items-center justify-center gap-5 group shadow-2xl">
                <svg class="w-8 h-8" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24s.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                Google로 로그인하기
            </button>
        </div>
    </div>

    <!-- MAIN APP SCREEN -->
    <div id="main-screen" class="min-h-screen flex flex-col hidden">
        <header class="bg-white/80 backdrop-blur-xl border-b h-24 flex items-center justify-between px-10 sticky top-0 z-50">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-black rounded-2xl flex items-center justify-center text-amber-400">
                    <i data-lucide="sparkles" class="w-6 h-6"></i>
                </div>
                <h2 class="font-black uppercase italic tracking-tighter text-2xl">Executive Styling</h2>
            </div>
            
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-4 bg-stone-50 px-6 py-3 rounded-full border border-stone-100">
                    <img id="user-photo" src="" class="w-8 h-8 rounded-full border border-stone-200">
                    <span id="user-name" class="text-xs font-bold tracking-tight">회장님</span>
                </div>
                <button onclick="handleLogout()" class="text-stone-300 hover:text-black text-xs font-bold tracking-widest uppercase transition-colors">Logout</button>
            </div>
        </header>

        <main class="max-w-6xl mx-auto w-full px-8 py-16 grid grid-cols-1 lg:grid-cols-12 gap-16">
            <div class="lg:col-span-5 space-y-10">
                <h3 class="text-3xl font-black tracking-tighter flex items-center gap-3">
                    <i data-lucide="camera" class="text-amber-600 w-8 h-8"></i> Visual Analysis
                </h3>
                
                <div id="upload-area" class="aspect-[4/5] border-2 border-dashed border-stone-200 rounded-[3.5rem] bg-white flex flex-col items-center justify-center cursor-pointer hover:border-amber-500 hover:shadow-2xl hover:shadow-amber-900/10 transition-all duration-700 overflow-hidden relative group">
                    <img id="preview-img" class="w-full h-full object-cover hidden group-hover:scale-105 transition-transform duration-700">
                    <div class="upload-placeholder text-center p-12 text-stone-300 space-y-4">
                        <i data-lucide="camera" class="w-16 h-16 mx-auto opacity-20 group-hover:scale-110 transition-transform"></i>
                        <p class="font-black text-xl text-stone-400">사진 데이터 업로드</p>
                    </div>
                    <input type="file" id="file-input" class="hidden" accept="image/*">
                </div>
                
                <button id="analyze-btn" onclick="startAnalysis()" class="hidden w-full bg-black text-white py-7 rounded-[2.5rem] font-black text-2xl shadow-2xl hover:bg-stone-800 transition-all">
                    AI 진단 리포트 생성
                </button>
            </div>

            <div class="lg:col-span-7">
                <div id="empty-state" class="h-full min-h-[500px] border-2 border-dashed rounded-[3.5rem] flex flex-col items-center justify-center text-stone-200 font-bold bg-white/50 space-y-4 shadow-sm border-stone-100">
                    <i data-lucide="palette" class="w-20 h-20 opacity-10"></i>
                    <p class="text-xl italic">데이터 수집 대기 중</p>
                </div>
                
                <div id="loading-state" class="h-full min-h-[500px] bg-white rounded-[3.5rem] flex flex-col items-center justify-center hidden shadow-2xl animate-pulse">
                    <div class="w-24 h-24 border-8 border-stone-100 border-t-amber-500 rounded-full animate-spin mb-8"></div>
                    <p class="font-black text-stone-800 text-2xl italic tracking-tighter uppercase">Processing Analytics...</p>
                </div>

                <div id="result-area" class="hidden space-y-10 animate-in slide-in-from-right-12 duration-1000">
                    <div class="bg-black text-white p-14 rounded-[4rem] shadow-2xl relative overflow-hidden border border-white/10">
                        <span class="text-[11px] font-black tracking-[0.5em] uppercase text-amber-500">Analysis Result</span>
                        <h4 id="res-season" class="text-7xl font-black italic tracking-tighter">진단 완료</h4>
                        <p id="res-summary" class="text-stone-400 text-2xl font-light leading-relaxed"></p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-stone-100 space-y-8">
                            <h5 class="font-black text-[12px] uppercase tracking-[0.3em] text-stone-400 flex items-center gap-2"><i data-lucide="check" class="text-emerald-500"></i> Best Palette</h5>
                            <div id="best-palette" class="flex flex-wrap gap-4"></div>
                        </div>
                        <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-stone-100 space-y-8">
                            <h5 class="font-black text-[12px] uppercase tracking-[0.3em] text-stone-400 flex items-center gap-2"><i data-lucide="x" class="text-rose-500"></i> Avoid Palette</h5>
                            <div id="worst-palette" class="flex flex-wrap gap-4"></div>
                        </div>
                    </div>

                    <div class="bg-white p-14 rounded-[4rem] shadow-sm border border-stone-100 space-y-10">
                        <h5 class="text-3xl font-black italic tracking-tighter flex items-center gap-4 border-b border-stone-50 pb-8 uppercase">
                            <i data-lucide="shirt" class="text-amber-600 w-8 h-8"></i> Styling Strategy
                        </h5>
                        <div id="advice-list" class="space-y-6"></div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="mt-auto py-20 text-center bg-white border-t border-stone-50">
            <p class="text-stone-300 text-[11px] tracking-[0.7em] font-black uppercase mb-2">Chief of Staff Secretary Office Platform</p>
        </footer>
    </div>
</body>
</html>
