<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프리미엄 퍼스널 컬러 분석 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #faf9f7; /* 고급스러운 베이지톤 배경 */
            color: #333333;
        }
        .font-serif {
            font-family: 'Noto Serif KR', serif;
        }
        .hidden { display: none !important; }
        
        /* 프리미엄 스캐닝 애니메이션 */
        .scan-container {
            position: relative;
            overflow: hidden;
            border-radius: 0.5rem;
        }
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(212, 175, 55, 0.8); /* 골드 색상 */
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            animation: scan 2s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
            z-index: 10;
        }
        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }
        
        /* 럭셔리 버튼 스타일 */
        .btn-gold {
            background: linear-gradient(135deg, #D4AF37 0%, #AA8222 100%);
            color: white;
            transition: all 0.3s ease;
        }
        .btn-gold:hover {
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
            transform: translateY(-1px);
        }
        
        /* 컬러 팔레트 스와치 */
        .color-swatch {
            width: 40px; height: 40px;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border: 1px solid #eee;
        }
    </style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center p-4">

    <!-- 메인 컨테이너 -->
    <div id="app-container" class="w-full max-w-lg bg-white rounded-none shadow-2xl overflow-hidden relative border border-gray-100">
        
        <!-- 로딩 오버레이 -->
        <div id="loading-overlay" class="absolute inset-0 bg-white/90 z-50 flex flex-col items-center justify-center hidden">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#D4AF37] mb-4"></div>
            <p class="font-serif text-[#D4AF37] tracking-widest text-sm">ANALYZING...</p>
        </div>

        <!-- 메인 분석 화면 (기본 화면으로 변경) -->
        <div id="main-screen" class="flex flex-col min-h-[600px]">
            <div class="px-8 py-5 border-b border-gray-100 flex justify-between items-center bg-white">
                <div>
                    <p class="text-[10px] text-[#D4AF37] font-bold tracking-widest">VISUAL ANALYSIS</p>
                    <p class="text-sm font-serif text-gray-800 mt-1">프리미엄 퍼스널 컬러 진단</p>
                </div>
            </div>

            <div class="p-8 flex-grow bg-[#faf9f7] flex flex-col">
                
                <!-- 이미지 업로드 섹션 -->
                <div id="upload-container" class="flex-grow flex flex-col justify-center">
                    <div class="text-center mb-8">
                        <h2 class="text-2xl font-serif text-gray-800 mb-2">Face Analysis</h2>
                        <p class="text-sm text-gray-500 font-light">정면에서 촬영된, 조명이 밝고 그림자가 없는<br>얼굴 사진을 업로드해 주십시오.</p>
                    </div>

                    <div class="relative w-full h-64 border-2 border-dashed border-[#D4AF37] border-opacity-40 bg-white flex flex-col items-center justify-center cursor-pointer hover:bg-gray-50 transition-colors group" id="drop-zone">
                        <input type="file" id="image-upload" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20">
                        <svg class="w-10 h-10 text-[#D4AF37] opacity-60 mb-3 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        <p class="text-sm text-gray-600 font-medium tracking-wide">사진 업로드 (Click or Drag)</p>
                        <p class="text-xs text-gray-400 mt-1">고해상도 이미지 권장</p>
                    </div>
                </div>

                <!-- 분석 중 화면 (스캐닝) -->
                <div id="scanning-container" class="hidden flex-grow flex flex-col items-center justify-center">
                    <div class="text-center mb-6">
                        <h2 class="text-xl font-serif text-gray-800">피부톤 데이터 추출 중</h2>
                        <p class="text-xs text-gray-400 tracking-widest mt-2">EXTRACTING PIXEL DATA</p>
                    </div>
                    <div class="scan-container w-48 h-48 bg-gray-200 border border-gray-300">
                        <img id="preview-image" class="w-full h-full object-cover opacity-70 grayscale">
                        <div class="scan-line"></div>
                    </div>
                </div>

                <!-- 결과 컨테이너 -->
                <div id="result-container" class="hidden flex-col items-center text-center pb-4">
                    <p class="text-xs text-[#D4AF37] tracking-[0.2em] font-bold mb-2">ANALYSIS COMPLETE</p>
                    <h1 id="result-title" class="text-3xl font-serif text-gray-900 mb-6"></h1>
                    
                    <!-- 추출된 피부톤 -->
                    <div class="mb-8 w-full bg-white p-5 shadow-sm border border-gray-100 flex items-center justify-between">
                        <div class="text-left">
                            <p class="text-[10px] text-gray-400 tracking-wider mb-1">EXTRACTED SKIN TONE</p>
                            <p id="skin-rgb-text" class="text-sm font-mono text-gray-700"></p>
                        </div>
                        <div id="extracted-color-box" class="w-12 h-12 rounded-full shadow-inner border border-gray-200"></div>
                    </div>

                    <p id="result-desc" class="text-sm text-gray-600 mb-8 leading-relaxed px-2 text-justify"></p>
                    
                    <div class="w-full mb-8">
                        <p class="text-xs text-gray-500 font-serif tracking-widest mb-4 border-b border-gray-200 pb-2">RECOMMENDED PALETTE</p>
                        <div id="palette-container" class="flex justify-center gap-4">
                            <!-- 컬러 팔레트 동적 생성 -->
                        </div>
                    </div>

                    <button id="btn-restart" class="w-full btn-gold py-4 text-sm tracking-widest font-bold">새로운 이미지 분석하기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 픽셀 데이터 추출용 숨김 캔버스 -->
    <canvas id="analysis-canvas" class="hidden"></canvas>

    <script type="module">
        // 분석 요소
        const uploadContainer = document.getElementById('upload-container');
        const scanningContainer = document.getElementById('scanning-container');
        const resultContainer = document.getElementById('result-container');
        const imageUpload = document.getElementById('image-upload');
        const previewImage = document.getElementById('preview-image');
        const analysisCanvas = document.getElementById('analysis-canvas');
        const ctx = analysisCanvas.getContext('2d', { willReadFrequently: true });

        // 결과 요소
        const resultTitle = document.getElementById('result-title');
        const resultDesc = document.getElementById('result-desc');
        const skinRgbText = document.getElementById('skin-rgb-text');
        const extractedColorBox = document.getElementById('extracted-color-box');
        const paletteContainer = document.getElementById('palette-container');

        // 퍼스널 컬러 데이터베이스
        const colorData = {
            spring: {
                title: "Spring Warm (봄 웜톤)",
                desc: "추출된 픽셀 데이터를 분석한 결과, 옐로우 베이스의 명도와 채도가 높은 '봄 웜톤' 속성이 가장 강하게 나타납니다. 생기 있고 화사한 이미지를 연출할 수 있으며, 코랄, 피치, 라이트 옐로우 계열의 색상이 피부톤을 가장 고급스럽게 밝혀줍니다.",
                colors: ["#FF7F50", "#FFCBA4", "#FAD6A5", "#E6C200"] // 코랄, 피치, 살구, 웜옐로우
            },
            summer: {
                title: "Summer Cool (여름 쿨톤)",
                desc: "추출된 픽셀 데이터를 분석한 결과, 블루/핑크 베이스의 명도가 높고 대비가 적은 '여름 쿨톤' 속성이 지배적입니다. 청량하고 우아한 분위기를 지니셨으며, 라벤더, 스카이블루, 파스텔 핑크 계열의 은은한 색상이 최적의 조화를 이룹니다.",
                colors: ["#E6E6FA", "#87CEEB", "#FFD1DC", "#98FF98"] // 라벤더, 스카이블루, 파스텔핑크, 파스텔민트
            },
            autumn: {
                title: "Autumn Warm (가을 웜톤)",
                desc: "추출된 픽셀 데이터를 분석한 결과, 옐로우 베이스의 명도가 낮고 깊이감 있는 '가을 웜톤' 속성이 확인되었습니다. 성숙하고 차분하며 고급스러운 이미지가 강점이며, 브라운, 카키, 머스타드 계열의 음영 색상이 우아함을 극대화합니다.",
                colors: ["#8B4513", "#BDB76B", "#D2B48C", "#CC7722"] // 새들브라운, 다크카키, 탄, 오크
            },
            winter: {
                title: "Winter Cool (겨울 쿨톤)",
                desc: "추출된 픽셀 데이터를 분석한 결과, 블루 베이스의 명도 대비가 뚜렷한 '겨울 쿨톤' 속성이 강하게 검출되었습니다. 도시적이고 세련된 카리스마를 지니셨으며, 블랙, 화이트, 딥 버건디, 네이비 등 강렬하고 선명한 색상이 이목구비를 더욱 선명하게 잡아줍니다.",
                colors: ["#000000", "#FFFFFF", "#800020", "#000080"] // 블랙, 화이트, 버건디, 네이비
            }
        };

        // 이미지 업로드 처리
        imageUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    startAnalysis(img);
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // 픽셀 분석 로직 (AI 연동 없음, HTML Canvas 방식)
        function startAnalysis(img) {
            uploadContainer.classList.add('hidden');
            scanningContainer.classList.remove('hidden');
            previewImage.src = img.src;

            // 캔버스에 이미지 렌더링 후 중앙 픽셀 데이터 추출
            analysisCanvas.width = img.width;
            analysisCanvas.height = img.height;
            ctx.drawImage(img, 0, 0, img.width, img.height);

            // 얼굴이 주로 위치하는 중앙 영역(약 20% 크기)의 평균 RGB 계산
            const startX = img.width * 0.4;
            const startY = img.height * 0.4;
            const sizeW = img.width * 0.2;
            const sizeH = img.height * 0.2;

            try {
                const imageData = ctx.getImageData(startX, startY, sizeW, sizeH);
                const data = imageData.data;
                let r = 0, g = 0, b = 0;
                let count = 0;

                // 4칸씩 이동 (R, G, B, A)
                for (let i = 0; i < data.length; i += 4) {
                    r += data[i];
                    g += data[i+1];
                    b += data[i+2];
                    count++;
                }

                r = Math.floor(r / count);
                g = Math.floor(g / count);
                b = Math.floor(b / count);

                // 스캐닝 연출을 위해 2초 대기 후 결과 도출
                setTimeout(() => {
                    determineColorSeason(r, g, b);
                }, 2000);

            } catch (err) {
                alert("이미지 처리 중 오류가 발생했습니다. 다른 이미지를 사용해 주십시오.");
                resetAnalysis();
            }
        }

        // RGB 값을 통한 톤 판별 알고리즘 (Rule-based)
        function determineColorSeason(r, g, b) {
            scanningContainer.classList.add('hidden');
            resultContainer.classList.remove('hidden');

            // 피부톤 HEX 변환 및 표시
            const hex = "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1).toUpperCase();
            skinRgbText.textContent = `RGB(${r}, ${g}, ${b}) / ${hex}`;
            extractedColorBox.style.backgroundColor = hex;

            // 분석 로직 (단순화된 기준)
            // 명도 (Lightness)
            const luminance = (0.299 * r + 0.587 * g + 0.114 * b);
            const isLight = luminance > 140; 
            
            // 온도 (Warm vs Cool) - Red와 Blue의 비율, Green의 관여도 기반
            // 피부에서 R이 압도적으로 높고, B가 상대적으로 낮으면 웜톤
            const isWarm = r > b && (g - b) > 15;

            let seasonKey = "";
            if (isWarm) {
                seasonKey = isLight ? "spring" : "autumn";
            } else {
                seasonKey = isLight ? "summer" : "winter";
            }

            const resultData = colorData[seasonKey];
            
            resultTitle.textContent = resultData.title;
            resultDesc.textContent = resultData.desc;
            
            // 팔레트 렌더링
            paletteContainer.innerHTML = "";
            resultData.colors.forEach(color => {
                const swatch = document.createElement('div');
                swatch.className = "color-swatch";
                swatch.style.backgroundColor = color;
                paletteContainer.appendChild(swatch);
            });
        }

        function resetAnalysis() {
            uploadContainer.classList.remove('hidden');
            scanningContainer.classList.add('hidden');
            resultContainer.classList.add('hidden');
            imageUpload.value = '';
        }

        document.getElementById('btn-restart').addEventListener('click', resetAnalysis);

    </script>
</body>
</html>
